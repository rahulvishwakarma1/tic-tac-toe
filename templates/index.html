<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Ultimate Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">
            <i class="bi bi-grid-3x3-gap-fill me-2"></i>
            Tic Tac Toe
        </span>
        <div class="d-flex align-items-center">
            <span class="badge bg-light text-primary me-3">
                <i class="bi bi-trophy-fill me-1"></i>
                <span id="score-x">0</span> : <span id="score-o">0</span>
            </span>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 col-sm-10">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-4 p-md-5">
                    <!-- Game Header -->
                    <div class="text-center mb-4">
                        <h1 class="display-5 fw-bold text-primary mb-3">
                            <i class="bi bi-controller me-2"></i>
                            Tic Tac Toe
                        </h1>
                        <div class="d-flex justify-content-center align-items-center gap-3">
                            <div id="player-x-indicator" class="text-center">
                                <div class="badge bg-primary fs-6 p-2">
                                    <i class="bi bi-x-circle-fill me-1"></i>Player X
                                </div>
                            </div>
                            <div class="text-muted fs-4">VS</div>
                            <div id="player-o-indicator" class="text-center">
                                <div class="badge bg-secondary fs-6 p-2">
                                    <i class="bi bi-circle-fill me-1"></i>Player O
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Game Board -->
                    <div id="board" class="row g-2 mb-4">
                        <!-- Grid will be populated by JavaScript -->
                    </div>

                    <!-- Game Status -->
                    <div class="alert alert-info mb-4" role="alert">
                        <div class="d-flex align-items-center justify-content-center">
                            <i class="bi bi-info-circle-fill me-2"></i>
                            <span id="game-status">Player X's turn</span>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                        <button id="reset-button" class="btn btn-primary btn-lg px-4" onclick="resetGame()">
                            <i class="bi bi-arrow-clockwise me-2"></i>New Game
                        </button>
                        <button id="clear-scores-button" class="btn btn-outline-secondary btn-lg px-4" onclick="clearScores()">
                            <i class="bi bi-trash me-2"></i>Clear Scores
                        </button>
                    </div>
                </div>
            </div>

            <!-- Game Stats -->
            <div class="row mt-4">
                <div class="col-12">
                    <div class="card border-0 shadow">
                        <div class="card-body">
                            <h5 class="card-title text-center mb-3">
                                <i class="bi bi-bar-chart-line me-2"></i>Game Statistics
                            </h5>
                            <div class="row text-center">
                                <div class="col-4">
                                    <div class="fw-bold text-primary">X Wins</div>
                                    <div class="fs-3" id="x-wins">0</div>
                                </div>
                                <div class="col-4">
                                    <div class="fw-bold text-warning">Draws</div>
                                    <div class="fs-3" id="draws">0</div>
                                </div>
                                <div class="col-4">
                                    <div class="fw-bold text-danger">O Wins</div>
                                    <div class="fs-3" id="o-wins">0</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-3 mt-5">
    <div class="container text-center">
        <small class="text-muted">
            <i class="bi bi-code-slash me-1"></i>
            Built with Flask & Bootstrap | 2024
        </small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let boardDiv = document.getElementById("board");
let statusDiv = document.getElementById("game-status");
let currentPlayerDisplay = "X";
let gameStats = {
    xWins: 0,
    oWins: 0,
    draws: 0
};

// Load stats from localStorage
function loadStats() {
    const saved = localStorage.getItem('ticTacToeStats');
    if (saved) {
        gameStats = JSON.parse(saved);
        updateStatsDisplay();
    }
}

// Save stats to localStorage
function saveStats() {
    localStorage.setItem('ticTacToeStats', JSON.stringify(gameStats));
}

// Update stats display
function updateStatsDisplay() {
    document.getElementById('x-wins').textContent = gameStats.xWins;
    document.getElementById('o-wins').textContent = gameStats.oWins;
    document.getElementById('draws').textContent = gameStats.draws;
    document.getElementById('score-x').textContent = gameStats.xWins;
    document.getElementById('score-o').textContent = gameStats.oWins;
}

// Update player indicators
function updatePlayerIndicators() {
    const xIndicator = document.getElementById('player-x-indicator').querySelector('.badge');
    const oIndicator = document.getElementById('player-o-indicator').querySelector('.badge');
    
    if (currentPlayerDisplay === "X") {
        xIndicator.className = 'badge bg-primary fs-6 p-2';
        oIndicator.className = 'badge bg-secondary fs-6 p-2';
    } else {
        xIndicator.className = 'badge bg-secondary fs-6 p-2';
        oIndicator.className = 'badge bg-danger fs-6 p-2';
    }
}

// Set up Bootstrap grid
boardDiv.className = "row g-2";

function render(board) {
    boardDiv.innerHTML = "";
    board.forEach((val, i) => {
        let col = document.createElement("div");
        col.className = "col-4";
        
        let btn = document.createElement("button");
        btn.innerText = val || "";
        btn.className = "btn btn-outline-secondary w-100 h-100 fs-2 fw-bold rounded-3";
        
        if (val === "X") {
            btn.className = "btn btn-primary w-100 h-100 fs-2 fw-bold rounded-3";
            btn.innerHTML = '<i class="bi bi-x-circle-fill"></i>';
        } else if (val === "O") {
            btn.className = "btn btn-danger w-100 h-100 fs-2 fw-bold rounded-3";
            btn.innerHTML = '<i class="bi bi-circle-fill"></i>';
        }
        
        if (val === " ") {
            btn.onclick = () => move(i);
            btn.style.minHeight = "100px";
        } else {
            btn.disabled = true;
            btn.style.minHeight = "100px";
        }
        
        col.appendChild(btn);
        boardDiv.appendChild(col);
    });
    
    updateStatus();
    updatePlayerIndicators();
}

function updateStatus() {
    const statusAlert = statusDiv.parentElement;
    
    if (checkWinner()) {
        const winner = currentPlayerDisplay === "X" ? "O" : "X";
        statusDiv.textContent = `🎉 Player ${winner} wins!`;
        statusAlert.className = 'alert alert-success mb-4';
        statusAlert.querySelector('i').className = 'bi bi-trophy-fill me-2';
        
        // Update stats
        if (winner === "X") {
            gameStats.xWins++;
        } else {
            gameStats.oWins++;
        }
        saveStats();
        updateStatsDisplay();
    } else if (checkDraw()) {
        statusDiv.textContent = "It's a draw!";
        statusAlert.className = 'alert alert-warning mb-4';
        statusAlert.querySelector('i').className = 'bi bi-handshake me-2';
        
        gameStats.draws++;
        saveStats();
        updateStatsDisplay();
    } else {
        statusDiv.textContent = `Player ${currentPlayerDisplay}'s turn`;
        statusAlert.className = 'alert alert-info mb-4';
        statusAlert.querySelector('i').className = 'bi bi-info-circle-fill me-2';
    }
}

function checkWinner() {
    const board = Array.from(boardDiv.querySelectorAll("button")).map(btn => {
        const text = btn.innerText.trim();
        if (text.includes('X') || btn.innerHTML.includes('x-circle')) return 'X';
        if (text.includes('O') || btn.innerHTML.includes('circle')) return 'O';
        return '';
    });
    const winPatterns = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
        [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
        [0, 4, 8], [2, 4, 6] // Diagonals
    ];
    
    return winPatterns.some(pattern => {
        const [a, b, c] = pattern;
        return board[a] && board[a] === board[b] && board[a] === board[c];
    });
}

function checkDraw() {
    const board = Array.from(boardDiv.querySelectorAll("button")).map(btn => {
        const text = btn.innerText.trim();
        if (text.includes('X') || btn.innerHTML.includes('x-circle')) return 'X';
        if (text.includes('O') || btn.innerHTML.includes('circle')) return 'O';
        return '';
    });
    return board.every(cell => cell !== '');
}

function move(i) {
    fetch("/move", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({index: i})
    })
    .then(res => res.json())
    .then(data => {
        currentPlayerDisplay = data.player;
        render(data.board);
    });
}

function resetGame() {
    fetch("/reset", {
        method: "POST"
    })
    .then(res => res.json())
    .then(data => {
        currentPlayerDisplay = data.player;
        render(data.board);
    });
}

function clearScores() {
    if (confirm('Are you sure you want to clear all game statistics?')) {
        gameStats = { xWins: 0, oWins: 0, draws: 0 };
        saveStats();
        updateStatsDisplay();
    }
}

// Initialize
loadStats();
render(["","","","","","","","",""]);
</script>

</body>
</html>
